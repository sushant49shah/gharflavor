databases:
  - name: gharflavor-db
    databaseName: gharflavor
    user: gharflavor
    plan: free

services:
  - type: web
    name: gharflavor-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gharflavor.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://gharflavor.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: gharflavor-db
          property: connectionString

  - type: web
    name: gharflavor
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://gharflavor-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
